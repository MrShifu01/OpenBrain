name: Daily Cron

# Replaces the Vercel Hobby cron (one-shot, opaque, has been silently failing).
# Hits the same /api/cron/daily endpoint that Vercel was hitting — push
# notifications, Gmail inbox scan for every connected user, enrich-all-brains
# catch-up sweep, and persona hygiene. Auth via the same CRON_SECRET bearer
# token the endpoint already validates.
#
# 04:00 UTC (06:00 SAST) — gives the Gmail scan time to populate inboxes
# before the user wakes up. Adjust the cron expression below if the user's
# timezone changes.

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  ping:
    name: Ping /api/cron/daily
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Hit cron endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET secret missing in repo settings"
            exit 1
          fi
          # --fail makes curl exit non-zero on HTTP errors so a 500 from the
          # endpoint surfaces as a failed Action run (vs Vercel cron silently
          # eating the error). --max-time 600 matches Vercel's max function
          # runtime so a slow scan doesn't get killed prematurely.
          response=$(curl --silent --show-error --fail --max-time 600 \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -X POST \
            "https://everion.smashburgerbar.co.za/api/cron/daily")
          echo "Cron response:"
          echo "$response" | head -c 4096
