<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <!-- Warm espresso charcoal background -->
  <rect width="48" height="48" rx="10" fill="#2D2926"/>
  <!-- E letterform — ivory mist, bold editorial -->
  <!-- Vertical stem -->
  <rect x="12" y="12" width="4" height="24" rx="1.5" fill="#E5E0D8"/>
  <!-- Top bar -->
  <rect x="12" y="12" width="22" height="4" rx="1.5" fill="#E5E0D8"/>
  <!-- Middle bar (shorter — classic E proportion) -->
  <rect x="12" y="22" width="16" height="4" rx="1.5" fill="#E5E0D8"/>
  <!-- Bottom bar -->
  <rect x="12" y="32" width="22" height="4" rx="1.5" fill="#E5E0D8"/>
  <!-- Bronze accent dot — single warm accent -->
  <circle cx="38" cy="38" r="3.5" fill="#A68B67"/>
</svg>
