<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <!-- Espresso charcoal ground — squircle corners -->
  <rect width="48" height="48" rx="10" fill="#2D2926"/>
  <!-- Three-node graph in warm bronze -->
  <g fill="#D4A56F" stroke="#D4A56F" stroke-linecap="round">
    <!-- connectors -->
    <line x1="19" y1="16" x2="16" y2="33" stroke-width="2.2"/>
    <line x1="19" y1="16" x2="36" y2="25" stroke-width="2.2"/>
    <line x1="16" y1="33" x2="36" y2="25" stroke-width="2.2"/>
    <!-- nodes -->
    <circle cx="19" cy="16" r="7"/>
    <circle cx="16" cy="33" r="6"/>
    <circle cx="36" cy="25" r="3.5"/>
  </g>
</svg>
